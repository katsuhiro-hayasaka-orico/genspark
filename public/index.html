<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予算管理ダッシュボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
            accent: { 50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif; }
    body { background: #f1f5f9; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card-hover { transition: all 0.2s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
    .upload-zone { border: 2px dashed #cbd5e1; transition: all 0.3s; }
    .upload-zone.dragover { border-color: #3b82f6; background: #eff6ff; }
    .upload-zone:hover { border-color: #93c5fd; background: #f8fafc; }
    .sidebar-item { cursor: pointer; padding: 8px 16px; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #64748b; transition: all 0.15s; }
    .sidebar-item:hover { background: #f1f5f9; color: #1e40af; }
    .sidebar-item.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
    .sidebar-item.disabled { opacity: 0.4; pointer-events: none; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th { background: #f8fafc; border-bottom: 2px solid #e2e8f0; padding: 8px 10px; text-align: left; font-weight: 600; color: #475569; position: sticky; top: 0; z-index: 1; }
    .data-table td { border-bottom: 1px solid #f1f5f9; padding: 6px 10px; color: #334155; }
    .data-table tr:hover td { background: #f8fafc; }
    .data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .tab-btn { padding: 6px 14px; font-size: 12px; font-weight: 500; color: #64748b; background: transparent; border: none; cursor: pointer; transition: all 0.15s; border-radius: 6px; }
    .tab-btn:hover { color: #2563eb; background: #f1f5f9; }
    .tab-btn.active { color: #2563eb; background: #eff6ff; font-weight: 600; }
    .btn-primary { background: #2563eb; color: white; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: white; color: #475569; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: 1px solid #e2e8f0; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .btn-secondary:hover { background: #f8fafc; border-color: #cbd5e1; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .overrun { color: #dc2626; font-weight: 600; }
    .underrun { color: #16a34a; font-weight: 600; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body class="min-h-screen">
  <!-- Sidebar Overlay -->
  <div id="sidebarOverlay" class="fixed inset-0 bg-black/30 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-60 bg-white border-r border-gray-100 z-40 transform -translate-x-full lg:translate-x-0 transition-transform no-print">
    <div class="p-4 border-b border-gray-100">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
          <i class="fas fa-chart-pie text-white text-sm"></i>
        </div>
        <div>
          <h1 class="text-[14px] font-bold text-gray-800">予算管理ダッシュボード</h1>
          <p class="text-[10px] text-gray-400">CSV可視化ツール v3.0</p>
        </div>
      </div>
    </div>
    <nav class="p-3 space-y-1">
      <div class="sidebar-item active" data-page="upload" onclick="navigateTo('upload')">
        <i class="fas fa-cloud-upload-alt w-5 text-center"></i><span>CSVアップロード</span>
      </div>
      <div class="sidebar-item disabled" data-page="dashboard" onclick="navigateTo('dashboard')" id="navDashboard">
        <i class="fas fa-gauge-high w-5 text-center"></i><span>ダッシュボード</span>
      </div>
      <div class="sidebar-item disabled" data-page="analysis" onclick="navigateTo('analysis')" id="navAnalysis">
        <i class="fas fa-chart-column w-5 text-center"></i><span>分析・比較</span>
      </div>
      <div class="sidebar-item disabled" data-page="variance" onclick="navigateTo('variance')" id="navVariance">
        <i class="fas fa-triangle-exclamation w-5 text-center"></i><span>予算差異</span>
      </div>
      <div class="sidebar-item disabled" data-page="items" onclick="navigateTo('items')" id="navItems">
        <i class="fas fa-list-ol w-5 text-center"></i><span>明細一覧</span>
      </div>
      <hr class="my-2 border-gray-100">
      <div class="px-4 py-2">
        <p class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">ファイル情報</p>
        <div id="sidebarFileInfo" class="text-[11px] text-gray-500">
          <p>未アップロード</p>
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <div class="lg:ml-60">
    <!-- Top Bar -->
    <header class="sticky top-0 bg-white/80 backdrop-blur-lg border-b border-gray-100 z-20 no-print">
      <div class="flex items-center justify-between px-4 h-12">
        <div class="flex items-center gap-3">
          <button class="lg:hidden text-gray-500" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <div id="breadcrumb" class="text-[12px] text-gray-500">
            <span class="text-gray-400">ホーム</span>
            <i class="fas fa-chevron-right text-[10px] mx-1.5 text-gray-300"></i>
            <span class="text-gray-700 font-medium">CSVアップロード</span>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span id="statusBadge" class="badge bg-gray-100 text-gray-500">データなし</span>
          <button onclick="refreshData()" class="w-8 h-8 rounded-lg hover:bg-gray-100 flex items-center justify-center text-gray-400 text-sm" title="再読込">
            <i class="fas fa-sync-alt"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main id="mainContent" class="p-4 md:p-6 max-w-7xl mx-auto">
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed top-16 right-4 z-50 space-y-2"></div>

  <script src="/static/app.js"></script>
</body>
</html>
